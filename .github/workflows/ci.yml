name: ci

on:
  push:
  pull_request:

jobs:
  native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: wtfjoke/setup-groovy@v2
        with:
          groovy-version: '4.0.26'
      - name: Validate
        run: python3 scripts/validate_scaffold.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t groovy-stakeholder .
      - name: Smoke test
        run: docker run --rm groovy-stakeholder --focus-family metrics --output-format json --seed 42
