name: ci-native

on:
  push:
  pull_request:

jobs:
  groovy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: wtfjoke/setup-groovy@v2
        with:
          groovy-version: '4.0.26'
      - run: python3 scripts/validate_scaffold.py
